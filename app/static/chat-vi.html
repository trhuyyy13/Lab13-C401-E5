<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trợ lý nghề nghiệp AI cho sinh viên HUST</title>
    <style>
      :root {
        --bg: #f1ece3;
        --panel: #fff9ef;
        --ink: #1f1c18;
        --muted: #6e665b;
        --brand: #0f766e;
        --brand-strong: #115e59;
        --bubble-user: #dbf4e8;
        --bubble-bot: #fff6e7;
        --line: rgba(31, 28, 24, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1000px 500px at -10% -20%, #f0cf9d 0%, transparent 60%),
          radial-gradient(900px 500px at 120% 0%, #b9e4d6 0%, transparent 55%),
          linear-gradient(180deg, #f8f3ea 0%, #efe5d6 100%);
        padding: 20px;
      }

      .app {
        max-width: 1000px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 8px 24px rgba(61, 46, 26, 0.08);
      }

      .sidebar {
        padding: 14px;
      }

      .brand {
        margin: 0;
        font-size: 1.2rem;
      }

      .sub {
        margin: 6px 0 14px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .field {
        margin-bottom: 10px;
      }

      label {
        display: block;
        font-size: 0.84rem;
        color: var(--muted);
        margin-bottom: 4px;
      }

      input,
      select,
      textarea,
      button {
        width: 100%;
        font: inherit;
      }

      input,
      select,
      textarea {
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fffcf6;
        color: var(--ink);
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 8px;
      }

      .chip {
        border: 1px solid rgba(17, 94, 89, 0.28);
        background: #e8f7f1;
        color: #0f4f4a;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.8rem;
        cursor: pointer;
      }

      .chat {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
        min-height: 600px;
      }

      .chat-head {
        border-bottom: 1px solid var(--line);
        padding: 14px;
      }

      .chat-head h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .chat-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .messages {
        padding: 14px;
        overflow-y: auto;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .msg {
        max-width: min(80%, 680px);
        padding: 10px 12px;
        border-radius: 14px;
        line-height: 1.45;
        border: 1px solid var(--line);
        animation: pop 180ms ease;
      }

      @keyframes pop {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .user {
        align-self: flex-end;
        background: var(--bubble-user);
      }

      .bot {
        align-self: flex-start;
        background: var(--bubble-bot);
      }

      .meta {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 7px;
      }

      .msg-body p {
        margin: 0 0 8px;
      }

      .msg-body p:last-child {
        margin-bottom: 0;
      }

      .msg-body ul {
        margin: 6px 0 8px 18px;
        padding: 0;
      }

      .msg-body li {
        margin-bottom: 4px;
      }

      .cv-answer {
        border: 1px solid rgba(15, 118, 110, 0.28);
        border-radius: 12px;
        background: #f4fbf8;
        padding: 10px;
      }

      .cv-badge {
        display: inline-block;
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #0f4f4a;
        background: #d9f4ea;
        border: 1px solid rgba(15, 118, 110, 0.28);
        border-radius: 999px;
        padding: 3px 8px;
        margin-bottom: 8px;
      }

      .cv-answer h4 {
        margin: 4px 0 6px;
        font-size: 0.95rem;
      }

      .composer {
        border-top: 1px solid var(--line);
        padding: 12px;
      }

      .composer-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .btn {
        border: none;
        background: linear-gradient(135deg, var(--brand), var(--brand-strong));
        color: #fff;
        border-radius: 12px;
        padding: 10px 15px;
        cursor: pointer;
        font-weight: 700;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .muted {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 6px;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }

        .chat {
          min-height: 70vh;
          height: auto;
        }

        .msg {
          max-width: 92%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="panel sidebar">
        <h1 class="brand">AI Career Assistant</h1>
        <p class="sub">Phiên bản cho sinh viên HUST. Đặt câu hỏi về intern, CV, phỏng vấn, lộ trình nghề nghiệp.</p>

        <div class="field">
          <label for="userId">User ID</label>
          <input id="userId" type="text" />
        </div>

        <div class="field">
          <label for="sessionId">Session ID</label>
          <input id="sessionId" type="text" />
        </div>

        <div class="field">
          <label for="feature">Feature</label>
          <select id="feature">
            <option value="qa">qa</option>
            <option value="summary">summary</option>
          </select>
        </div>

        <div class="field">
          <label>Gợi ý nhanh</label>
          <div class="chips">
            <button class="chip" type="button" data-prompt="Mình là sinh viên năm 3 HUST, nên tìm intern backend ở đâu?">Intern backend</button>
            <button class="chip" type="button" data-prompt="CV của mình nên viết thế nào để nổi bật hơn cho vị trí AI Engineer intern?">Tối ưu CV</button>
            <button class="chip" type="button" data-prompt="Hãy lập cho mình kế hoạch 4 tuần luyện phỏng vấn kỹ thuật.">Luyện phỏng vấn</button>
            <button class="chip" type="button" data-prompt="GPA 2.8 có vẫn xin được intern tốt không và cần bổ sung gì?">GPA thấp</button>
          </div>
        </div>

        <p class="muted">Mẹo: Mở thêm trang /dashboard để xem độ trễ, token, chi phí theo thời gian.</p>
      </aside>

      <section class="panel chat">
        <header class="chat-head">
          <h2>Trò chuyện với trợ lý nghề nghiệp</h2>
          <p id="statusText">Sẵn sàng</p>
        </header>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <div class="composer-row">
            <textarea id="messageInput" placeholder="Nhập câu hỏi bằng tiếng Việt..." aria-label="Nội dung câu hỏi"></textarea>
            <button class="btn" id="sendBtn" type="button">Gửi</button>
          </div>
          <p class="muted">API sử dụng: POST /chat</p>
        </div>
      </section>
    </main>

    <script>
      const userIdEl = document.getElementById("userId");
      const sessionIdEl = document.getElementById("sessionId");
      const featureEl = document.getElementById("feature");
      const messageInputEl = document.getElementById("messageInput");
      const sendBtnEl = document.getElementById("sendBtn");
      const messagesEl = document.getElementById("messages");
      const statusTextEl = document.getElementById("statusText");

      function makeId(prefix) {
        return prefix + "-" + Math.random().toString(16).slice(2, 8);
      }

      userIdEl.value = makeId("hust");
      sessionIdEl.value = makeId("sess");

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatBotAnswer(text, sourcePrompt) {
        const safeText = escapeHtml((text || "").replace(/\r\n/g, "\n"));
        const isCvAnswer = /(^|\W)cv(\W|$)|hồ sơ|resume/i.test(sourcePrompt || "") ||
          /(^|\W)cv(\W|$)|hồ sơ|resume/i.test(text || "");

        if (!isCvAnswer) {
          return safeText.split("\n").map((line) => `<p>${line || "&nbsp;"}</p>`).join("");
        }

        const lines = safeText.split("\n").map((line) => line.trim()).filter(Boolean);
        let html = '<div class="cv-answer"><div class="cv-badge">Gợi ý cải thiện CV</div>';
        let inList = false;

        for (const rawLine of lines) {
          const line = rawLine.replace(/^#{1,6}\s*/, "");
          const bullet = line.match(/^[-*•]\s+(.+)/);

          if (bullet) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${bullet[1]}</li>`;
            continue;
          }

          if (inList) {
            html += "</ul>";
            inList = false;
          }

          if (/^\d+[\.)]\s+/.test(line) || /:$/.test(line)) {
            html += `<h4>${line}</h4>`;
          } else {
            html += `<p>${line}</p>`;
          }
        }

        if (inList) {
          html += "</ul>";
        }

        return html + "</div>";
      }

      function appendMessage(role, text, meta, sourcePrompt) {
        const msg = document.createElement("article");
        msg.className = "msg " + role;

        const body = document.createElement("div");
        body.className = "msg-body";
        if (role === "bot") {
          body.innerHTML = formatBotAnswer(text, sourcePrompt);
        } else {
          body.textContent = text;
        }
        msg.appendChild(body);

        if (meta) {
          const metaEl = document.createElement("div");
          metaEl.className = "meta";
          metaEl.textContent = meta;
          msg.appendChild(metaEl);
        }

        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setSendingState(isSending) {
        sendBtnEl.disabled = isSending;
        statusTextEl.textContent = isSending ? "Đang gửi yêu cầu..." : "Sẵn sàng";
      }

      async function sendMessage() {
        const message = messageInputEl.value.trim();
        if (!message) return;

        const payload = {
          user_id: userIdEl.value.trim() || makeId("hust"),
          session_id: sessionIdEl.value.trim() || makeId("sess"),
          feature: featureEl.value,
          message,
        };

        appendMessage("user", message);
        messageInputEl.value = "";
        setSendingState(true);

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.detail || "Yêu cầu thất bại");
          }

          const meta =
            "độ trễ=" + data.latency_ms + "ms | vào=" + data.tokens_in + " | ra=" + data.tokens_out +
            " | chi phí=$" + Number(data.cost_usd || 0).toFixed(6) + " | mã=" + data.correlation_id;
          appendMessage("bot", data.answer, meta, message);
        } catch (err) {
          appendMessage("bot", "Hệ thống đang gặp lỗi. Bạn thử lại sau nhé.", "lỗi=" + err.message, message);
        } finally {
          setSendingState(false);
        }
      }

      sendBtnEl.addEventListener("click", sendMessage);

      messageInputEl.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" && !ev.shiftKey) {
          ev.preventDefault();
          sendMessage();
        }
      });

      document.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          messageInputEl.value = chip.getAttribute("data-prompt") || "";
          messageInputEl.focus();
        });
      });

      appendMessage(
        "bot",
        "Chào bạn, mình là AI Career Assistant cho sinh viên HUST. Bạn muốn hỗ trợ về intern, CV hay phỏng vấn?"
      );
    </script>
  </body>
</html>
